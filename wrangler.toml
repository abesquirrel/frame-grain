name = "fujifilm-recipes-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "fujifilm-recipes"
database_id = "440b5e35-840f-4c4d-98a6-6cace7f92ebc"  # Fill after: wrangler d1 create fujifilm-recipes

# ─── KV Namespace (cache) ──────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "9ade42eaaae74ae0ac302c05d061e3b4"          # Fill after: wrangler kv:namespace create RECIPE_CACHE

# ─── Environments ─────────────────────────────────────────
[env.production]
name = "fujifilm-recipes-api-prod"
# routes replaced by default workers.dev deployment
