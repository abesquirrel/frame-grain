name = "fujifilm-recipes-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "fujifilm-recipes"
database_id = "YOUR_D1_DATABASE_ID"  # Fill after: wrangler d1 create fujifilm-recipes

# ─── KV Namespace (cache) ──────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"          # Fill after: wrangler kv:namespace create RECIPE_CACHE

# ─── Pages / Static Site ──────────────────────────────────
[site]
bucket = "./site"                    # Output dir for static assets

# ─── Environments ─────────────────────────────────────────
[env.production]
name = "fujifilm-recipes-api-prod"
routes = [
  { pattern = "recipes.yourdomain.com/api/*", zone_name = "yourdomain.com" }
]
